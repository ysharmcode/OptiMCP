name: Publish to PyPI

# Publishes to PyPI via OIDC Trusted Publishing (no API token stored).
# Fires when a GitHub Release is published, and can also be run manually
# (workflow_dispatch) to publish the version currently on the default branch.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # A dedicated environment lets you add manual-approval / branch protections
    # on PyPI publishes. Must match the environment set on the PyPI publisher.
    environment:
      name: pypi
      url: https://pypi.org/p/optimcp
    permissions:
      id-token: write  # required for OIDC Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
